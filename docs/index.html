<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>2D Jenga</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 50px;
      background: #1a1a2e;
      overflow: auto;
    }
    canvas {
      background: #1a1a2e;
      display: block;
      margin: 0 auto;
      width: 800px;
      height: 600px;
    }
    #ui {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      text-align: center;
      z-index: 10;
    }
    #turn {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 10px;
    }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #444;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
    }
    button:hover { background: #555; }
    #camera-controls {
      margin-top: 10px;
    }
    #camera-controls button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
<div id="ui">
  <div id="turn">Player 1 Turn</div>
  <button onclick="restartGame()">Restart</button>
  <div id="camera-controls">
    <button onclick="setViewFront()">Front</button>
    <button onclick="setViewBack()">Back</button>
    <button onclick="setViewLeft()">Left</button>
    <button onclick="setViewRight()">Right</button>
  </div>
</div>

<script>
class JengaScene extends Phaser.Scene {
  constructor() { super("Jenga"); }

  // =====================
  // CAMERA CONTROLS
  // =====================
  setupCameraControls() {
    // Camera view buttons are handled via HTML onclick events
    window.setViewFront = () => {
      this.viewMode = 'front';
    };
    window.setViewBack = () => {
      this.viewMode = 'back';
    };
    window.setViewLeft = () => {
      this.viewMode = 'left';
    };
    window.setViewRight = () => {
      this.viewMode = 'right';
    };
  }

  create() {
    this.engine = Matter.Engine.create();
    this.world = this.engine.world;

    this.engine.world.gravity.y = 2; // Increased for faster falling
    this.engine.positionIterations = 30; // Increased for stability
    this.engine.velocityIterations = 30; // Increased for stability

    this.viewMode = 'front'; // front, back, left, right

    this.blocks = [];
    this.ground = null;
    this.graphics = this.add.graphics();

    this.currentPlayer = 1;
    this.gameOver = false;
    this.isStabilizing = false; // Track if waiting for tower to stabilize

    this.touchedBlock = null;
    this.dragStart = null;
    this.selectedBlock = null; // Track which block player selected
    this.removedBlocks = []; // Track blocks that have been successfully removed

    // Draw persistent background to ensure canvas is filled
    this.graphics.fillStyle(0x1a1a2e, 1);
    this.graphics.fillRect(0, 0, 800, 600);
    this.graphics.setDepth(-1000); // Ensure background is behind everything

    this.createGround();
    this.createTower();
    this.setupInput();
    this.setupCameraControls();
  }

  update(time, delta) {
    if (this.gameOver) return;

    Matter.Engine.update(this.engine, delta);

    this.syncBlocks();
    this.renderBlocks();
    this.checkCollapse();

    // Check if tower is stabilizing after a move
    if (this.isStabilizing) {
      let maxVelocity = 0;
      for (const b of this.blocks) {
        const v = Math.sqrt(b.body.velocity.x ** 2 + b.body.velocity.y ** 2);
        maxVelocity = Math.max(maxVelocity, v);
      }

      // Tower is stable when all blocks have very low velocity
      if (maxVelocity < 0.01) {
        this.isStabilizing = false;
        this.endTurn();
      }
    }
  }

  // =====================
  // GROUND
  // =====================
  createGround() {
    const CATEGORY_GROUND = 0x0004;
    this.ground = Matter.Bodies.rectangle(400, 550, 1000, 100, {
      isStatic: true,
      friction: 1.0,
      frictionStatic: 1.0,
      collisionFilter: {
        category: CATEGORY_GROUND,
        mask: 0xFFFF // Collide with everything
      }
    });
    Matter.World.add(this.world, this.ground);
  }

  // =====================
  // TOWER
  // =====================
  createTower() {
    const levels = 6; // Reduced for stability
    const w = 150, h = 25, d = 30; // All blocks same size

    // Collision categories
    const CATEGORY_X = 0x0001; // X-orientation blocks
    const CATEGORY_Z = 0x0002; // Z-orientation blocks
    const CATEGORY_GROUND = 0x0004; // Ground

    for (let i = 0; i < levels; i++) {
      const orientation = i % 2 === 0 ? "x" : "z";
      const category = orientation === "x" ? CATEGORY_X : CATEGORY_Z;
      const mask = CATEGORY_GROUND | (orientation === "x" ? CATEGORY_Z : CATEGORY_X);

      for (let j = 0; j < 2; j++) {
        let x = 400;
        let z = 0;

        // 90-degree rotation at each level
        if (orientation === "x") {
          // X-orientation: blocks extend in x direction
          x = 400 + (j - 0.5) * w;
          z = 0;
        } else {
          // Z-orientation: blocks extend in z direction
          // In 2D physics, offset slightly in x to prevent overlap
          x = 400 + (j - 0.5) * 2; // Small offset to prevent overlap
          z = (j - 0.5) * w;
        }

        // Position tower on ground
        const y = 500 - i * h;

        const body = Matter.Bodies.rectangle(x, y, w, h, {
          friction: 1.0,
          frictionStatic: 1.0,
          frictionAir: 0.002, // Reduced for faster falling
          density: 0.006, // Increased density for stability
          angle: 0,
          collisionFilter: {
            category: category,
            mask: mask
          }
        });

        Matter.World.add(this.world, body);

        this.blocks.push({ body, w, h, d, z });
      }
    }
  }

  // =====================
  // PROJECTION
  // =====================
  project(x, y, z) {
    // Simple 2D projection based on view mode - keep tower centered
    const centerX = 400;
    const centerY = 300;

    switch (this.viewMode) {
      case 'front':
        // Front view: x and y as-is, z for depth sorting
        return { x: x, y: y, depth: z };
      case 'back':
        // Back view: flip x, y as-is, z for depth sorting
        return { x: 800 - x, y: y, depth: -z };
      case 'left':
        // Left view: z becomes x, y as-is, x for depth sorting
        return { x: 400 - z, y: y, depth: x - 400 };
      case 'right':
        // Right view: z becomes x, y as-is, x for depth sorting
        return { x: 400 + z, y: y, depth: 400 - x };
      default:
        return { x: x, y: y, depth: z };
    }
  }

  syncBlocks() {
    for (const b of this.blocks) {
      const pos = b.body.position;
      b.screen = this.project(pos.x, pos.y, b.z);
    }
  }

  // =====================
  // RENDER
  // =====================
  renderBlocks() {
    this.graphics.clear();

    // Draw ground
    if (this.ground) {
      const pos = this.ground.position;
      const width = this.ground.bounds.max.x - this.ground.bounds.min.x;
      const height = this.ground.bounds.max.y - this.ground.bounds.min.y;

      this.graphics.fillStyle(0x5c4033, 1); // Darker wood color
      this.graphics.fillRect(pos.x - width/2, pos.y - height/2, width, height);
    }

    this.blocks.sort((a, b) => a.screen.depth - b.screen.depth);

    for (const b of this.blocks) {
      this.drawBlock(b);
    }

    // Highlight touched block
    if (this.touchedBlock) {
      const pos = this.touchedBlock.screen;
      const { w, h } = this.touchedBlock;
      this.graphics.lineStyle(4, 0xffff00, 1);
      this.graphics.strokeRect(pos.x - w/2, pos.y - h/2, w, h);
    }

    // Draw drag direction arrow
    if (this.touchedBlock && this.dragStart && this.input.activePointer) {
      const blockPos = this.touchedBlock.screen;
      const pointerX = this.input.activePointer.x;
      const pointerY = this.input.activePointer.y;

      const dx = pointerX - this.dragStart.x;
      const dy = pointerY - this.dragStart.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance > 10) {
        this.graphics.lineStyle(3, 0x00ff00, 1);
        this.graphics.beginPath();
        this.graphics.moveTo(blockPos.x, blockPos.y);
        this.graphics.lineTo(pointerX, pointerY);
        this.graphics.strokePath();

        // Draw arrow head
        const angle = Math.atan2(dy, dx);
        const arrowSize = 10;
        this.graphics.beginPath();
        this.graphics.moveTo(pointerX, pointerY);
        this.graphics.lineTo(
          pointerX - arrowSize * Math.cos(angle - Math.PI / 6),
          pointerY - arrowSize * Math.sin(angle - Math.PI / 6)
        );
        this.graphics.moveTo(pointerX, pointerY);
        this.graphics.lineTo(
          pointerX - arrowSize * Math.cos(angle + Math.PI / 6),
          pointerY - arrowSize * Math.sin(angle + Math.PI / 6)
        );
        this.graphics.strokePath();
      }
    }
  }

  getCorners(b) {
    const { body, w, h, d, z } = b;
    const x = body.position.x;
    const y = body.position.y;

    return [
      { x: x - w/2, y: y - h/2, z: z - d/2 },
      { x: x + w/2, y: y - h/2, z: z - d/2 },
      { x: x + w/2, y: y - h/2, z: z + d/2 },
      { x: x - w/2, y: y - h/2, z: z + d/2 },
      { x: x - w/2, y: y + h/2, z: z - d/2 },
      { x: x + w/2, y: y + h/2, z: z - d/2 },
      { x: x + w/2, y: y + h/2, z: z + d/2 },
      { x: x - w/2, y: y + h/2, z: z + d/2 }
    ];
  }

  drawBlock(b) {
    const pos = b.screen;
    const { w, h } = b;
    const color = (Math.abs(b.z) < 5) ? 0xdeb887 :
                 (Math.abs(b.z) < 15) ? 0xc49a6c : 0xa67c52;

    this.graphics.fillStyle(color, 1);
    this.graphics.fillRect(pos.x - w/2, pos.y - h/2, w, h);

    // Draw edge/border
    this.graphics.lineStyle(2, 0x3d2817, 1);
    this.graphics.strokeRect(pos.x - w/2, pos.y - h/2, w, h);
  }

  drawQuad(a, b, c, d, color) {
    this.graphics.fillStyle(color, 1);
    this.graphics.beginPath();
    this.graphics.moveTo(a.x, a.y);
    this.graphics.lineTo(b.x, b.y);
    this.graphics.lineTo(c.x, c.y);
    this.graphics.lineTo(d.x, d.y);
    this.graphics.closePath();
    this.graphics.fillPath();
  }

  // =====================
  // PICKING
  // =====================
  pointInQuad(px, py, a, b, c, d) {
    const area = (p1, p2, p3) =>
      Math.abs((p1.x*(p2.y-p3.y)+p2.x*(p3.y-p1.y)+p3.x*(p1.y-p2.y))/2);

    const A = area(a,b,c) + area(a,c,d);
    const A1 = area({x:px,y:py},a,b);
    const A2 = area({x:px,y:py},b,c);
    const A3 = area({x:px,y:py},c,d);
    const A4 = area({x:px,y:py},d,a);

    return Math.abs(A - (A1+A2+A3+A4)) < 0.5;
  }

  pickBlock(pointer) {
    // Ensure blocks have screen property before picking
    this.syncBlocks();

    const sorted = [...this.blocks].sort(
      (a,b)=>b.screen.depth - a.screen.depth
    );

    for (const b of sorted) {
      const pos = b.screen;
      const { w, h } = b;
      // Simple rectangle bounds check for 2D
      if (pointer.x >= pos.x - w/2 && pointer.x <= pos.x + w/2 &&
          pointer.y >= pos.y - h/2 && pointer.y <= pos.y + h/2) {
        return b;
      }
    }
    return null;
  }

  // =====================
  // INPUT
  // =====================
  setupInput() {
    this.input.on("pointerdown", (pointer) => {
      // Only allow input if not stabilizing
      if (this.isStabilizing) return;

      const block = this.pickBlock(pointer);
      if (block) {
        this.touchedBlock = block;
        this.selectedBlock = block; // Track selected block
        this.dragStart = { x: pointer.x, y: pointer.y };
        this.dragConstraint = Matter.Constraint.create({
          bodyA: block.body,
          pointB: { x: pointer.x, y: pointer.y },
          stiffness: 0.1,
          damping: 0.1
        });
        Matter.World.add(this.world, this.dragConstraint);
      }
    });

    this.input.on("pointermove", (pointer) => {
      if (this.dragConstraint) {
        this.dragConstraint.pointB = { x: pointer.x, y: pointer.y };
      }
    });

    this.input.on("pointerup", () => {
      if (this.dragConstraint) {
        Matter.World.remove(this.world, this.dragConstraint);
        this.dragConstraint = null;
        this.touchedBlock = null;
        this.dragStart = null;
        // Keep selectedBlock for game over check

        // Start stabilization period
        this.isStabilizing = true;
      }
    });
  }

  // =====================
  // GAME LOGIC
  // =====================
  endTurn() {
    this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
    this.selectedBlock = null; // Reset selected block for next turn
    document.getElementById("turn").innerText =
      "Player " + this.currentPlayer + " Turn";
  }

  checkCollapse() {
    for (const b of this.blocks) {
      // Check if block has been successfully removed (moved far from tower)
      if (Math.abs(b.body.position.x - 400) > 200) {
        if (!this.removedBlocks.includes(b)) {
          this.removedBlocks.push(b);
        }
      }

      // Check if block has fallen to ground (y > 580, ground level)
      if (b.body.position.y > 580) {
        // Only fail if this is NOT the selected block AND NOT removed
        if (this.selectedBlock && b !== this.selectedBlock && !this.removedBlocks.includes(b)) {
          this.gameOver = true;
          const winner = this.currentPlayer === 1 ? 2 : 1;
          document.getElementById("turn").innerText =
            "💥 Player " + winner + " Wins!";
        }
      }
    }
  }
}

// =====================
// BOOT
// =====================
let scene;

function restartGame() {
  location.reload();
}

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#1a1a2e",
  scene: {
    create: function() {
      scene = new JengaScene();
      this.scene.add("Jenga", scene, true);
    }
  }
};

new Phaser.Game(config);
</script>
</body>
</html>
