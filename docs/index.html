<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>2D Jenga</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 50px;
      background: #1a1a2e;
      overflow: auto;
    }
    canvas {
      background: #1a1a2e;
      display: block;
      margin: 0 auto;
      width: 800px;
      height: 600px;
    }
    #ui {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      text-align: center;
      z-index: 10;
    }
    #turn {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 10px;
    }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #444;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
    }
    button:hover { background: #555; }
    #camera-controls {
      margin-top: 10px;
    }
    #camera-controls button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
<div id="ui">
  <div id="turn">Player 1 Turn</div>
  <button onclick="restartGame()">Restart</button>
  <div id="camera-controls">
    <button onclick="flipCameraLeft()">← Rotate Left</button>
    <button onclick="flipCameraRight()">Rotate Right →</button>
  </div>
</div>

<script>
class JengaScene extends Phaser.Scene {
  constructor() { super("Jenga"); }

  // =====================
  // CAMERA CONTROLS
  // =====================
  setupCameraControls() {
    // Camera flip buttons are handled via HTML onclick events
    window.flipCameraLeft = () => {
      this.camera3d.angle -= Math.PI / 4;
    };
    window.flipCameraRight = () => {
      this.camera3d.angle += Math.PI / 4;
    };
  }

  create() {
    this.engine = Matter.Engine.create();
    this.world = this.engine.world;

    this.engine.world.gravity.y = 1;
    this.engine.positionIterations = 10;
    this.engine.velocityIterations = 10;

    this.camera3d = { angle: 0.8, tilt: 0.4, zoom: 1 };

    this.blocks = [];
    this.ground = null;
    this.graphics = this.add.graphics();

    this.currentPlayer = 1;
    this.gameOver = false;

    // Draw persistent background to ensure canvas is filled
    this.graphics.fillStyle(0x1a1a2e, 1);
    this.graphics.fillRect(0, 0, 800, 600);
    this.graphics.setDepth(-1000); // Ensure background is behind everything

    this.createGround();
    this.createTower();
    this.setupInput();
    this.setupCameraControls();
  }

  update(time, delta) {
    if (this.gameOver) return;

    Matter.Engine.update(this.engine, delta);

    this.syncBlocks();
    this.renderBlocks();
    this.checkCollapse();
  }

  // =====================
  // GROUND
  // =====================
  createGround() {
    this.ground = Matter.Bodies.rectangle(400, 550, 1000, 100, {
      isStatic: true,
      friction: 1.0,
      frictionStatic: 1.0
    });
    Matter.World.add(this.world, this.ground);
  }

  // =====================
  // TOWER
  // =====================
  createTower() {
    const levels = 4; // Reduced for stability
    const w = 150, h = 25, d = 30; // Bigger blocks

    for (let i = 0; i < levels; i++) {
      const orientation = i % 2 === 0 ? "x" : "z";

      for (let j = 0; j < 2; j++) {
        let x = 400;
        let z = 0;

        if (orientation === "x") {
          z = (j - 0.5) * d;
          // Offset X slightly to prevent 2D collision (physics only)
          x += (j - 0.5) * 0.5;
        } else {
          x += (j - 0.5) * d;
        }

        // Position tower on ground
        const y = 500 - i * h;

        const body = Matter.Bodies.rectangle(x, y, w, h, {
          friction: 1.0,
          frictionStatic: 1.0,
          frictionAir: 0.005,
          density: 0.004,
          angle: 0
        });

        Matter.World.add(this.world, body);

        this.blocks.push({ body, w, h, d, z });
      }
    }
  }

  // =====================
  // PROJECTION
  // =====================
  project(x, y, z) {
    const { angle, tilt, zoom } = this.camera3d;

    // Translate to origin before rotation
    const centerX = 400;
    const centerY = 500;

    const x0 = x - centerX;
    const y0 = y - centerY;

    const cos = Math.cos(angle);
    const sin = Math.sin(angle);

    const px = x0 * cos - z * sin;
    const depth = x0 * sin + z * cos;
    const py = y0 + depth * tilt;

    // Translate back after rotation
    return { x: px * zoom + centerX, y: py * zoom + centerY, depth };
  }

  syncBlocks() {
    for (const b of this.blocks) {
      const pos = b.body.position;
      b.screen = this.project(pos.x, pos.y, b.z);
    }
  }

  // =====================
  // RENDER
  // =====================
  renderBlocks() {
    this.graphics.clear();

    // Draw ground
    if (this.ground) {
      const pos = this.ground.position;
      const width = this.ground.bounds.max.x - this.ground.bounds.min.x;
      const height = this.ground.bounds.max.y - this.ground.bounds.min.y;

      this.graphics.fillStyle(0x5c4033, 1); // Darker wood color
      this.graphics.fillRect(pos.x - width/2, pos.y - height/2, width, height);
    }

    this.blocks.sort((a, b) => a.screen.depth - b.screen.depth);

    for (const b of this.blocks) {
      this.drawBlock(b);
    }
  }

  getCorners(b) {
    const { body, w, h, d, z } = b;
    const x = body.position.x;
    const y = body.position.y;

    return [
      { x: x - w/2, y: y - h/2, z: z - d/2 },
      { x: x + w/2, y: y - h/2, z: z - d/2 },
      { x: x + w/2, y: y - h/2, z: z + d/2 },
      { x: x - w/2, y: y - h/2, z: z + d/2 },
      { x: x - w/2, y: y + h/2, z: z - d/2 },
      { x: x + w/2, y: y + h/2, z: z - d/2 },
      { x: x + w/2, y: y + h/2, z: z + d/2 },
      { x: x - w/2, y: y + h/2, z: z + d/2 }
    ];
  }

  drawBlock(b) {
    const corners = this.getCorners(b);
    const p = corners.map(c => this.project(c.x, c.y, c.z));

    this.drawQuad(p[4], p[5], p[6], p[7], 0xdeb887); // top
    this.drawQuad(p[5], p[1], p[2], p[6], 0xc49a6c); // side
    this.drawQuad(p[4], p[0], p[1], p[5], 0xa67c52); // front
  }

  drawQuad(a, b, c, d, color) {
    this.graphics.fillStyle(color, 1);
    this.graphics.beginPath();
    this.graphics.moveTo(a.x, a.y);
    this.graphics.lineTo(b.x, b.y);
    this.graphics.lineTo(c.x, c.y);
    this.graphics.lineTo(d.x, d.y);
    this.graphics.closePath();
    this.graphics.fillPath();
  }

  // =====================
  // PICKING
  // =====================
  pointInQuad(px, py, a, b, c, d) {
    const area = (p1, p2, p3) =>
      Math.abs((p1.x*(p2.y-p3.y)+p2.x*(p3.y-p1.y)+p3.x*(p1.y-p2.y))/2);

    const A = area(a,b,c) + area(a,c,d);
    const A1 = area({x:px,y:py},a,b);
    const A2 = area({x:px,y:py},b,c);
    const A3 = area({x:px,y:py},c,d);
    const A4 = area({x:px,y:py},d,a);

    return Math.abs(A - (A1+A2+A3+A4)) < 0.5;
  }

  pickBlock(pointer) {
    // Ensure blocks have screen property before picking
    this.syncBlocks();

    const sorted = [...this.blocks].sort(
      (a,b)=>b.screen.depth - a.screen.depth
    );

    for (const b of sorted) {
      const p = this.getCorners(b).map(c=>this.project(c.x,c.y,c.z));
      if (this.pointInQuad(pointer.x, pointer.y, p[4],p[5],p[6],p[7])) {
        return b;
      }
    }
    return null;
  }

  // =====================
  // INPUT
  // =====================
  setupInput() {
    this.input.on("pointerdown", (p) => {
      if (this.gameOver) return;

      const block = this.pickBlock(p);
      if (!block) return;

      const scale = 1 / this.camera3d.zoom;

      this.dragConstraint = Matter.Constraint.create({
        pointA: { x: p.x * scale, y: p.y * scale },
        bodyB: block.body,
        stiffness: 0.002,
        damping: 0.1
      });

      Matter.World.add(this.world, this.dragConstraint);
      this.draggedBlock = block;
    });

    this.input.on("pointermove", (p) => {
      if (this.dragConstraint) {
        const scale = 1 / this.camera3d.zoom;
        this.dragConstraint.pointA.x = p.x * scale;
        this.dragConstraint.pointA.y = p.y * scale;
      }
    });

    this.input.on("pointerup", () => {
      if (this.dragConstraint) {
        Matter.World.remove(this.world, this.dragConstraint);
        this.dragConstraint = null;

        this.endTurn();
      }
    });
  }

  // =====================
  // GAME LOGIC
  // =====================
  endTurn() {
    this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
    document.getElementById("turn").innerText =
      "Player " + this.currentPlayer + " Turn";
  }

  checkCollapse() {
    for (const b of this.blocks) {
      if (Math.abs(b.body.angle) > 0.5) {
        this.gameOver = true;
        const winner = this.currentPlayer === 1 ? 2 : 1;
        document.getElementById("turn").innerText =
          "💥 Player " + winner + " Wins!";
      }
    }
  }
}

// =====================
// BOOT
// =====================
let scene;

function restartGame() {
  location.reload();
}

const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#1a1a2e",
  scene: {
    create: function() {
      scene = new JengaScene();
      this.scene.add("Jenga", scene, true);
    }
  }
};

new Phaser.Game(config);
</script>
</body>
</html>
